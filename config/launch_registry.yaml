modules:
  pipeline_inspection:
    package: scheduler
    launch: pipeline_inspection.launch
    description: "Pipe detector ROS node wrapper"
    arguments:
      use_external_process: false
      algorithm_pkg: pipe_detector
      algorithm_type: pipe_detector_node.py
      algorithm_name: pipe_detector_node
      observation_topic: /inspection/pipeline_observation
      pipe_centerline_topic: /pipe/centerline
      debug_image_topic: /pipe/debug_image
      publish_centerline: true
      publish_debug_image: true
      publish_compressed_debug_image: true
      publish_scheduler_observation: true
      camera_index: 0
      frame_width: 640
      frame_height: 480
      fps: 15
      use_left_half: true
      rknn_model_path: /home/orangepi/pipe_project/yolomodel/best_rknn_model640/best-rk3588.rknn
      rknn_backend: full
      rknn_target: rk3588
      threshold_low: 10
      threshold_high: 255
      threshold_kernel: 5
      yolo_kernel: 15
      expand_radius: 7
  docking:
    package: scheduler
    launch: docking_algorithm.launch
    description: "Docking perception module wrapper"
    arguments:
      blue_light_topic: /docking/blue_light
      dock_pose_topic: /docking/dock_pose
      apriltag_topic: /docking/apriltag
      light_json_file: runtime/docking/pose_data.jsonl
      apriltag_json_file: runtime/docking/apriltag_pose.jsonl
      start_light_detector: true
      start_apriltag_detector: true
      camera_index: 0
      frame_width: 0
      frame_height: 0
      fx: 1115.5075
      fy: 1116.0352
      cx: 692.3729
      cy: 503.0312
      threshold: 240
      kernel_size: 7
      epsilon: 0.02
      publish_topics: true
      write_json: false
      show_debug_windows: false
