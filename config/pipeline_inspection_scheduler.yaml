# Mission controller selected by scheduler_node. Supported values:
# pipeline_inspection, cage_inspection, dam_inspection, docking.
mission_type: "pipeline_inspection"

# Generic flight mode used by scheduler_node before any mission logic starts.
flight_mode: "GUIDED"

# Whether scheduler_node should block until /mavros/state reports FCU connected.
wait_for_fcu_connection: true

# Keep mode switching disabled until the real RC transport and target flight
# mode are connected and verified.
set_flight_mode_on_start: false

# Never arm automatically while RC commands are preview-only.
auto_arm: false

# Maximum time spent waiting for MAVROS services to appear.
mavros_service_wait_sec: 5.0

# Module name registered in launch_registry.yaml. The controller asks the launch
# manager to start this module automatically.
autostart_module: "pipeline_inspection"

# Topic carrying the pipeline observation with primary line, secondary line,
# and corner intersection.
observation_topic: "/inspection/pipeline_observation"

# Whether the inspection state machine starts immediately after scheduler init.
auto_start_inspection: true

# Main control loop frequency.
command_rate_hz: 20.0

# MAVROS topics used by the vehicle adapter.
rc_override_topic: "/mavros/rc/override"
imu_topic: "/mavros/imu/data"
state_topic: "/mavros/state"
local_pose_topic: "/mavros/local_position/pose"

# RC output mapping. Negative limits are mirrored around the center value:
# slow=1350, medium=1200, fast=1100 with the defaults below.
rc_center_pwm: 1500
rc_slow_max_pwm: 1650
rc_medium_max_pwm: 1800
rc_fast_max_pwm: 1900

# Flip an axis by setting its direction to -1.
rc_surge_direction: 1
rc_sway_direction: 1
rc_heave_direction: 1
rc_yaw_direction: 1

# Ignore tiny normalized commands and limit PWM change per control cycle.
rc_input_deadband: 0.02
rc_pwm_slew_step: 20

# Drop observations older than this timeout.
observation_timeout_sec: 0.5

# Primary line must stay valid for this long before entering align mode.
line_stable_hold_sec: 0.5

# Target line must stay aligned for this long before entering tracking mode.
align_hold_sec: 1.0

# Corner trigger must stay active for this long before committing to the turn.
turn_trigger_hold_sec: 0.3

# Minimum time to keep turning before accepting the secondary line.
turn_commit_sec: 0.5

# Maximum time spent turning while searching for the secondary line.
turn_timeout_sec: 4.0

# Lost-line recovery and active search scan timing.
recovery_timeout_sec: 3.0
search_reverse_interval_sec: 3.0

# Optional total inspection duration. Set to 0 to disable time-based finish.
inspection_duration_sec: 0.0

# Minimum observation confidence accepted by the controller.
min_observation_confidence: 0.6

# Minimum number of points required to fit each centerline.
min_primary_line_points: 8
min_secondary_line_points: 8

# Row used to measure lateral offset. 0 is image top, 1 is image bottom.
reference_row_ratio: 0.65

# Alignment tolerances.
lateral_tolerance_norm: 0.08
angle_tolerance_rad: 0.10

# Visual outer-loop gains. Axis signs should be configured in the RC mapping
# above; these gains are kept positive for the default image/body convention.
sway_from_lateral_gain: 0.8
sway_from_lateral_rate_gain: 0.08
yaw_rate_from_angle_gain: 0.35
yaw_rate_from_lateral_gain: 0.10

# Normalized RC feedforward commands in the range [0, 1].
align_surge_command: 0.25
track_surge_command: 0.65
turn_surge_command: 0.25
search_yaw_command: 0.35
recovery_yaw_command: 0.30

# Desired yaw rate used while committing to the corner turn. Once the
# secondary line is visible, visual feedback refines this reference.
turn_yaw_rate: 0.18

# Reference scales used by the optional EKF/IMU feedback inner loop. Linear
# velocity feedback remains disabled until the future vehicle interface marks
# it valid and gives it sufficient quality.
max_forward_speed: 0.20
max_lateral_speed: 0.15
max_yaw_rate: 0.25

# Visual-error filtering and continuous forward-command reduction.
error_filter_tau_sec: 0.15
error_rate_filter_tau_sec: 0.25
minimum_surge_scale: 0.15
surge_lateral_error_weight: 2.5
surge_angle_error_weight: 2.0
hard_stop_lateral_error: 0.65
hard_stop_angle_error: 0.60

# Automatic RC gear selection while tracking. Alignment, search, corner
# approach, turning and recovery always use slow gear.
medium_gear_lateral_error: 0.18
medium_gear_angle_error: 0.20
fast_gear_lateral_error: 0.06
fast_gear_angle_error: 0.08
fast_gear_min_confidence: 0.80

# Feedback inner-loop gains. Yaw-rate feedback uses IMU gyro data when the
# future FCU adapter supplies it. Linear velocity feedback is quality-gated.
yaw_rate_feedback_kp: 0.45
linear_velocity_feedback_kp: 0.15
min_linear_velocity_quality: 0.60
feedback_timeout_sec: 0.30

# Enter slow corner-approach mode at this image-bottom distance.
corner_approach_bottom_distance_px: 240.0

# Start turning once the intersection is this close to the bottom edge.
turn_trigger_bottom_distance_px: 120.0

# If the secondary line lies on the image right, a value of 1 means positive
# yaw rate is a right turn. Set to -1 if your yaw convention is opposite.
turn_direction_sign_from_image_x: 1.0

# Launch manager service throttling.
module_request_interval_sec: 1.0
service_wait_sec: 0.2
